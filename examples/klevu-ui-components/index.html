<!DOCTYPE html>
<html lang="en">
  <head>
    <script type="module">
      import "@klevu/ui/style.css"
      import "@klevu/ui/init.js"
      import "@klevu/ui/quicksearch.js"
      import "@klevu/ui/loadingindicator.js"
      import "@klevu/ui/popularterms.js"
      import "@klevu/ui/searchfield.js"
    </script>
  </head>
  <body>
    <h1>Hello Klevu web components</h1>
    <klevu-init
      url="https://eucs29v2.ksearchnet.com/cs/v2/search"
      apiKey="klevu-164651914788114877"
    ></klevu-init>
    <klevu-quicksearch
      style="width: 600px"
      id="quicksearch"
    ></klevu-quicksearch>
    <p>This should be normal page once again. Popup should go over.</p>
    <h2>Popular terms as component next</h2>
    <klevu-popularterms></klevu-popularterms>

    <hr />

    <h1>Example of just search field</h1>
    <klevu-searchfield id="searchfield" dosearch></klevu-searchfield>
    <pre id="result"></pre>

    <script type="module">
      document
        .getElementById("searchfield")
        .addEventListener("klevu-search-result", function (event) {
          console.log(event)
          document.getElementById("result").innerHTML = JSON.stringify(
            event.detail.results,
            undefined,
            2
          )
        })
    </script>
  </body>
</html>
